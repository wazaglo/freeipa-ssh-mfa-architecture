networks:
  test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  ipa-server:
    image: freeipa/freeipa-server:almalinux-9
    hostname: ipa.test.local
    container_name: ipa-server
    privileged: true
    networks:
      test-net:
        ipv4_address: 172.20.0.10
    extra_hosts:
      dev01.test.local: 172.20.0.11
      uat01.test.local: 172.20.0.12
      prd01.test.local: 172.20.0.13
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "88:88/tcp"
      - "88:88/udp"
      - "389:389"
      - "443:443"
      - "464:464/tcp"
      - "464:464/udp"
    environment:
      PASSWORD: admin123
      IPA_SERVER_IP: 172.20.0.10
      IPA_SERVER_INSTALL_OPTS: >
        --realm=TEST.LOCAL
        --domain=test.local
        --hostname=ipa.test.local
        --setup-dns
        --no-forwarders
        --auto-reverse
        --mkhomedir
        --unattended
    volumes:
      - ipa-data:/data
    command: no-exit
    tmpfs:
      - /run
      - /tmp
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD", "ldapsearch", "-H", "ldap://127.0.0.1:389", "-x", "-LLL", "-b", "cn=ipa,cn=etc,dc=test,dc=local"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s

  dev01:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        env: dev
    hostname: dev01.test.local
    container_name: ipa-dev01
    networks:
      test-net:
        ipv4_address: 172.20.0.11
    extra_hosts:
      ipa.test.local: 172.20.0.10
    dns:
      - 172.20.0.10
    depends_on:
      ipa-server:
        condition: service_healthy
    environment:
      IPA_SERVER: ipa.test.local
      IPA_DOMAIN: test.local
      IPA_REALM: TEST.LOCAL
      ADMIN_PASS: admin123

  uat01:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        env: uat
    hostname: uat01.test.local
    container_name: ipa-uat01
    networks:
      test-net:
        ipv4_address: 172.20.0.12
    extra_hosts:
      ipa.test.local: 172.20.0.10
    dns:
      - 172.20.0.10
    depends_on:
      ipa-server:
        condition: service_healthy
    environment:
      IPA_SERVER: ipa.test.local
      IPA_DOMAIN: test.local
      IPA_REALM: TEST.LOCAL
      ADMIN_PASS: admin123

  prd01:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        env: prod
    hostname: prd01.test.local
    container_name: ipa-prd01
    networks:
      test-net:
        ipv4_address: 172.20.0.13
    extra_hosts:
      ipa.test.local: 172.20.0.10
    dns:
      - 172.20.0.10
    depends_on:
      ipa-server:
        condition: service_healthy
    environment:
      IPA_SERVER: ipa.test.local
      IPA_DOMAIN: test.local
      IPA_REALM: TEST.LOCAL
      ADMIN_PASS: admin123

volumes:
  ipa-data:
