name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck -s bash --severity=warning --exclude=SC2086,SC2034,SC2154 scripts/*.sh

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint ansible/ configs/

  summary:
    name: Result
    runs-on: ubuntu-latest
    needs: [shellcheck, yamllint]
    if: always()
    steps:
      - name: Post status
        run: |
          if [ "${{ needs.shellcheck.result }}" = "success" ] && [ "${{ needs.yamllint.result }}" = "success" ]; then
            echo "## Lint Passed :white_check_mark:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ShellCheck and Yamllint both passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Lint Failed :x:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| ShellCheck | ${{ needs.shellcheck.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Yamllint | ${{ needs.yamllint.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const shellcheck = '${{ needs.shellcheck.result }}' === 'success' ? ':white_check_mark:' : ':x:';
            const yamllint = '${{ needs.yamllint.result }}' === 'success' ? ':white_check_mark:' : ':x:';
            const allPassed = '${{ needs.shellcheck.result }}' === 'success' && '${{ needs.yamllint.result }}' === 'success';
            const emoji = allPassed ? ':white_check_mark:' : ':x:';
            const body = `## Lint ${allPassed ? 'Passed' : 'Failed'} ${emoji}\n\n| Check | Status |\n|-------|--------|\n| ShellCheck | ${shellcheck} |\n| Yamllint | ${yamllint} |`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'GitHub Actions' && c.body.includes('## Lint'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
